<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Barberon</title>
  <link rel="icon" href="../img/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* Admin-specific extras */
    .admin-layout { display:flex; height:100vh; overflow:hidden; }
    .admin-sidebar {
      width:220px; flex-shrink:0; background:var(--bg-card);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      overflow-y:auto;
    }
    .admin-nav a {
      display:flex; align-items:center; gap:.6rem;
      padding:.6rem 1.25rem; color:var(--text-muted); font-size:.875rem;
      text-decoration:none; transition:background .1s,color .1s;
      border:none; background:none; width:100%; cursor:pointer;
    }
    .admin-nav a:hover, .admin-nav a.active { background:var(--bg-hover); color:var(--text); }
    .admin-main { flex:1; overflow-y:auto; padding:1.5rem; min-width:0; }
    .admin-topbar {
      background:var(--bg-card); border-bottom:1px solid var(--border);
      padding:.65rem 1.25rem; display:flex; align-items:center; gap:.75rem;
      position:sticky; top:0; z-index:50;
    }
    .admin-title { font-size:1.4rem; font-weight:700; margin-bottom:1.25rem; }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:1rem; margin-bottom:1.5rem; }
    .stat-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:1rem; }
    .stat-value { font-size:1.75rem; font-weight:700; color:var(--primary); }
    .stat-label { font-size:.8rem; color:var(--text-muted); margin-top:.25rem; }
    .admin-table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius); }
    .admin-table { width:100%; border-collapse:collapse; font-size:.875rem; }
    .admin-table th,.admin-table td { padding:.65rem .85rem; border-bottom:1px solid var(--border); text-align:left; }
    .admin-table th { color:var(--text-muted); font-weight:600; white-space:nowrap; background:var(--bg-card); }
    .admin-table tbody tr:last-child td { border-bottom:none; }
    .admin-table tbody tr:hover td { background:var(--bg-hover); }
    .admin-mobile-nav { display:none; overflow-x:auto; gap:.5rem; padding:.75rem 1rem; border-bottom:1px solid var(--border); }
    .admin-mobile-nav a { white-space:nowrap; font-size:.8rem; padding:.35rem .75rem; background:var(--bg-card); border:1px solid var(--border); border-radius:999px; color:var(--text-muted); text-decoration:none; cursor:pointer; }
    .admin-mobile-nav a.active { background:var(--primary); color:#000; border-color:var(--primary); }
    @media(max-width:768px){ .admin-sidebar{display:none} .admin-mobile-nav{display:flex} }
    /* page-builder specifics */
    .pb-tabs { display:flex; gap:.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .pb-tab { padding:.4rem 1rem; border-radius:999px; font-size:.82rem; cursor:pointer; border:1px solid var(--border); background:var(--bg-card); color:var(--text-muted); font-family:var(--font); }
    .pb-tab.active { background:var(--primary); color:#000; border-color:var(--primary); font-weight:600; }
    .pb-panel { display:none; } .pb-panel.active { display:block; }
    .color-row { display:flex; align-items:center; gap:.75rem; margin-bottom:.75rem; }
    .color-row label { min-width:140px; font-size:.85rem; }
    .module-list { display:flex; flex-direction:column; gap:.5rem; }
    .module-item { display:flex; align-items:center; gap:.75rem; padding:.6rem .85rem; background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); cursor:grab; }
    .module-item input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color:var(--primary); }
    /* pricing card mini */
    .plan-status-badge { display:inline-flex; align-items:center; gap:.35rem; font-size:.78rem; font-weight:600; padding:.25rem .65rem; border-radius:999px; }
    .plan-active { background:rgba(34,197,94,.15); color:var(--success); border:1px solid var(--success); }
    .plan-inactive { background:rgba(239,68,68,.15); color:var(--danger); border:1px solid var(--danger); }
    .plan-expired { background:rgba(245,158,11,.15); color:var(--primary); border:1px solid var(--primary); }
  </style>
</head>
<body style="overflow:hidden">

<div id="adminRoot" style="height:100vh;display:flex;align-items:center;justify-content:center">
  <div class="spinner"></div>
</div>

<div id="toastContainer"></div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════
   ADMIN SPA — single-file multi-page admin panel
   ══════════════════════════════════════════════════════════════ */

const ADMIN_NAV = [
  { id:'dashboard',    icon:'📊', label:'Dashboard',        roles:['ADMIN','SUPERADMIN'] },
  { id:'services',     icon:'✂️',  label:'Serviços',         roles:['ADMIN','SUPERADMIN'] },
  { id:'bookings',     icon:'📅', label:'Agendamentos',      roles:['ADMIN','SUPERADMIN'] },
  { id:'hours',        icon:'🕐', label:'Horários',          roles:['ADMIN','SUPERADMIN'] },
  { id:'payment',      icon:'💳', label:'Pagamento',         roles:['ADMIN','SUPERADMIN'] },
  { id:'page-builder', icon:'🎨', label:'Page Builder',      roles:['ADMIN','SUPERADMIN'] },
  { id:'plans',        icon:'💎', label:'Meu Plano',         roles:['ADMIN','SUPERADMIN'] },
  { id:'barbershops',  icon:'🏪', label:'Barbearias',        roles:['SUPERADMIN'] },
  { id:'users',        icon:'👥', label:'Usuários',          roles:['SUPERADMIN'] },
  { id:'settings',     icon:'⚙️', label:'Configurações',     roles:['SUPERADMIN'] },
];

let _user = null;
let _page = null;

/* ── Bootstrap ───────────────────────────────────────────────── */
async function boot() {
  if (!Auth.isLoggedIn()) { redirect('/pages/login.html'); return; }
  try {
    _user = await apiMe();
  } catch(e) { Auth.clear(); redirect('/pages/login.html'); return; }
  if (!['ADMIN','SUPERADMIN'].includes(_user.role)) { redirect('/index.html'); return; }
  renderShell();
  const p = new URLSearchParams(location.search).get('page') || 'dashboard';
  go(p);
}

function redirect(path) { window.location.href = ROOT + path; }

/* ── Shell ───────────────────────────────────────────────────── */
function renderShell() {
  const links = ADMIN_NAV.filter(n => n.roles.includes(_user.role));
  document.getElementById('adminRoot').outerHTML = `
<div class="admin-layout" id="adminRoot">
  <aside class="admin-sidebar">
    <a href="${ROOT}/index.html" class="brand" style="padding:.75rem 1.25rem 1.25rem;display:flex;align-items:center;gap:.5rem;color:var(--text);text-decoration:none;font-weight:700;font-size:1rem">
      <img src="${ROOT}/img/logo.svg" width="22" height="22"> Barberon
    </a>
    <nav class="admin-nav" id="sideNav">
      ${links.map(n=>`<a href="?page=${n.id}" data-page="${n.id}" onclick="go('${n.id}');return false;">${n.icon} ${n.label}</a>`).join('')}
      <div style="flex:1"></div>
      <a href="#" onclick="doLogout();return false;" style="color:var(--danger)">🚪 Sair</a>
    </nav>
  </aside>
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">
    <div class="admin-mobile-nav" id="mobNav">
      ${links.map(n=>`<a href="?page=${n.id}" data-page="${n.id}" onclick="go('${n.id}');return false;">${n.icon} ${n.label}</a>`).join('')}
    </div>
    <div class="admin-topbar">
      <span id="breadcrumb" style="font-weight:600;flex:1"></span>
      <span class="text-muted text-sm">${escHtml(_user.name||_user.email)}</span>
      <span class="badge badge-${_user.role==='SUPERADMIN'?'primary':'warning'}" style="font-size:.65rem">${_user.role}</span>
    </div>
    <div class="admin-main" id="content">
      <div class="spinner"></div>
    </div>
  </div>
</div>`;
}

function go(page) {
  const nav = ADMIN_NAV.find(n=>n.id===page);
  if (!nav||!nav.roles.includes(_user.role)) page='dashboard';
  _page = page;
  document.querySelectorAll('[data-page]').forEach(a=>a.classList.toggle('active',a.dataset.page===page));
  const bc = document.getElementById('breadcrumb');
  const n  = ADMIN_NAV.find(x=>x.id===page);
  if (bc&&n) bc.textContent = n.icon+' '+n.label;
  history.replaceState({},'','?page='+page);
  const el = document.getElementById('content');
  el.innerHTML = '<div class="spinner"></div>';
  const fn = PAGES[page];
  if(fn) Promise.resolve(fn(el)).catch(e=>{ el.innerHTML=`<div class="alert alert-danger">${escHtml(e.message)}</div>`; });
  else el.innerHTML = `<p class="text-muted">Página não encontrada.</p>`;
}

async function doLogout() { await apiLogout(); }

/* ══════════════════════════════════════════════════════════════
   PAGE RENDERERS
   ══════════════════════════════════════════════════════════════ */
const PAGES = {};

/* ── DASHBOARD ────────────────────────────────────────────────── */
PAGES.dashboard = async function(el) {
  let shopId = _user.barbershopId;
  let stats = {};
  try { stats = await api('/api/admin/stats.php' + (shopId?`?barbershopId=${shopId}`:'')); } catch {}
  el.innerHTML = `
    <h2 class="admin-title">Dashboard</h2>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value">${stats.bookingsToday??'-'}</div><div class="stat-label">Agendamentos hoje</div></div>
      <div class="stat-card"><div class="stat-value">${stats.bookingsMonth??'-'}</div><div class="stat-label">Este mês</div></div>
      <div class="stat-card"><div class="stat-value">${stats.services??'-'}</div><div class="stat-label">Serviços</div></div>
      <div class="stat-card"><div class="stat-value">${stats.clients??'-'}</div><div class="stat-label">Clientes</div></div>
    </div>
    <h3 style="font-weight:600;margin-bottom:.75rem">Agendamentos recentes</h3>
    <div id="recentBks"><div class="spinner spinner-sm"></div></div>`;
  try {
    const bks = await api('/api/admin/bookings.php' + (shopId?`?barbershopId=${shopId}&limit=10`:'?limit=10'));
    const rows = bks.slice?.(0,10)??[];
    if (!rows.length) { document.getElementById('recentBks').innerHTML='<p class="text-muted text-sm">Nenhum agendamento.</p>'; return; }
    document.getElementById('recentBks').innerHTML=`
      <div class="admin-table-wrap">
        <table class="admin-table">
          <thead><tr><th>Cliente</th><th>Serviço</th><th>Data</th><th>Status</th></tr></thead>
          <tbody>${rows.map(b=>`<tr>
            <td>${escHtml(b.user?.name||b.userId||'-')}</td>
            <td>${escHtml(b.service?.name||'-')}</td>
            <td>${fmtDate(b.date)}</td>
            <td><span class="badge badge-${bkStatusCls(b.status)}">${b.status||'-'}</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>`;
  } catch(e) { document.getElementById('recentBks').innerHTML=`<p class="text-danger text-sm">${escHtml(e.message)}</p>`; }
};

function bkStatusCls(s){return{CONFIRMED:'success',PENDING:'warning',CANCELLED:'danger',COMPLETED:'muted'}[s]||'muted';}

/* ── SERVICES ─────────────────────────────────────────────────── */
PAGES.services = async function(el) {
  const shopId = await getShopId();
  if (!shopId) { el.innerHTML='<div class="alert alert-warning">Conta não vinculada a uma barbearia.</div>'; return; }
  let svcs = [];
  try { svcs = await api(`/api/admin/services.php?barbershopId=${shopId}`); } catch(e) {}
  el.innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <h2 class="admin-title" style="margin:0">Serviços</h2>
      <button class="btn btn-primary btn-sm" onclick="openSvcDialog(null,'${shopId}')">+ Novo serviço</button>
    </div>
    <div id="svcsWrap">${renderSvcsTable(svcs, shopId)}</div>
    ${svcDialog()}`;
};

function renderSvcsTable(svcs, shopId) {
  if (!svcs.length) return `<div style="text-align:center;padding:3rem;border:1px dashed var(--border);border-radius:var(--radius)"><p class="text-muted">Nenhum serviço cadastrado.</p><button class="btn btn-primary mt-4" onclick="openSvcDialog(null,'${shopId}')">Adicionar serviço</button></div>`;
  return `<div class="admin-table-wrap"><table class="admin-table">
    <thead><tr><th>Nome</th><th>Preço</th><th>Duração</th><th>Ativo</th><th>Ações</th></tr></thead>
    <tbody>${svcs.map(s=>`<tr>
      <td>${escHtml(s.name)}</td>
      <td>${fmtPrice(s.price)}</td>
      <td>${fmtDuration(s.duration)}</td>
      <td><span class="badge badge-${s.active?'success':'danger'}">${s.active?'Sim':'Não'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="openSvcDialog(${JSON.stringify(JSON.stringify(s))},'${shopId}')">Editar</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSvc('${s.id}','${shopId}')">Excluir</button>
      </td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function svcDialog() {
  return `<div class="dialog-backdrop" id="svcDialog">
    <div class="dialog">
      <h3 class="dialog-title" id="svcDlgTitle">Novo serviço</h3>
      <input type="hidden" id="svcId">
      <div class="form-group"><label class="form-label">Nome *</label><input class="form-input" id="svcName" placeholder="Ex: Corte masculino"></div>
      <div class="form-group"><label class="form-label">Descrição</label><textarea class="form-input form-textarea" id="svcDesc" placeholder="Descrição do serviço"></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div class="form-group"><label class="form-label">Preço (R$) *</label><input class="form-input" type="number" step="0.01" id="svcPrice" placeholder="30.00"></div>
        <div class="form-group"><label class="form-label">Duração (HH:MM) *</label><input class="form-input" id="svcDur" placeholder="00:30"></div>
      </div>
      <div class="form-group"><label class="form-label">URL da imagem</label><input class="form-input" id="svcImg" placeholder="https://…"></div>
      <div class="form-group"><label style="display:flex;align-items:center;gap:.5rem;cursor:pointer"><input type="checkbox" id="svcActive" checked style="accent-color:var(--primary)"> Ativo</label></div>
      <div id="svcErr" class="alert alert-danger hidden mb-3"></div>
      <div class="flex gap-3">
        <button class="btn btn-outline" onclick="closeDialog('svcDialog')">Cancelar</button>
        <button class="btn btn-primary" id="svcSaveBtn" onclick="saveSvc()">Salvar</button>
      </div>
    </div>
  </div>`;
}

function openSvcDialog(jsonStr, shopId) {
  const dlg = document.getElementById('svcDialog');
  document.getElementById('svcErr').classList.add('hidden');
  if (jsonStr) {
    const s = JSON.parse(jsonStr);
    document.getElementById('svcDlgTitle').textContent='Editar serviço';
    document.getElementById('svcId').value   = s.id;
    document.getElementById('svcName').value = s.name;
    document.getElementById('svcDesc').value = s.description||'';
    document.getElementById('svcPrice').value= s.price;
    document.getElementById('svcDur').value  = s.duration||'00:30';
    document.getElementById('svcImg').value  = s.imageUrl||'';
    document.getElementById('svcActive').checked = !!s.active;
  } else {
    document.getElementById('svcDlgTitle').textContent='Novo serviço';
    ['svcId','svcName','svcDesc','svcPrice','svcImg'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('svcDur').value='00:30';
    document.getElementById('svcActive').checked=true;
  }
  dlg._shopId = shopId;
  dlg.classList.add('open');
}

async function saveSvc() {
  const dlg = document.getElementById('svcDialog');
  const shopId = dlg._shopId;
  const id   = document.getElementById('svcId').value;
  const errEl= document.getElementById('svcErr');
  const btn  = document.getElementById('svcSaveBtn');
  const name = document.getElementById('svcName').value.trim();
  const price= parseFloat(document.getElementById('svcPrice').value);
  if (!name||isNaN(price)) { errEl.textContent='Preencha nome e preço.'; errEl.classList.remove('hidden'); return; }
  btn.disabled=true; btn.textContent='Salvando…';
  try {
    const body = { barbershopId:shopId, name, description:document.getElementById('svcDesc').value, price, duration:document.getElementById('svcDur').value||'00:30', imageUrl:document.getElementById('svcImg').value, active:document.getElementById('svcActive').checked };
    if (id) { body.id=id; await api('/api/admin/services.php',{method:'PUT',body:JSON.stringify(body)}); }
    else await api('/api/admin/services.php',{method:'POST',body:JSON.stringify(body)});
    closeDialog('svcDialog');
    toast('Serviço salvo!','success');
    const svcs = await api(`/api/admin/services.php?barbershopId=${shopId}`);
    document.getElementById('svcsWrap').innerHTML = renderSvcsTable(svcs, shopId);
  } catch(e){ errEl.textContent=e.message; errEl.classList.remove('hidden'); }
  finally{ btn.disabled=false; btn.textContent='Salvar'; }
}

async function deleteSvc(id, shopId) {
  if (!confirm('Excluir este serviço?')) return;
  try {
    await api(`/api/admin/services.php?id=${id}`,{method:'DELETE'});
    toast('Serviço excluído.','info');
    const svcs = await api(`/api/admin/services.php?barbershopId=${shopId}`);
    document.getElementById('svcsWrap').innerHTML = renderSvcsTable(svcs, shopId);
  } catch(e){ toast(e.message,'error'); }
}

/* ── BOOKINGS ─────────────────────────────────────────────────── */
PAGES.bookings = async function(el) {
  const shopId = await getShopId();
  if (!shopId) { el.innerHTML='<div class="alert alert-warning">Conta não vinculada a uma barbearia.</div>'; return; }
  el.innerHTML = `
    <div class="flex justify-between items-center mb-4">
      <h2 class="admin-title" style="margin:0">Agendamentos</h2>
      <div class="flex gap-2">
        <select class="form-select" id="bkStatusFilter" onchange="reloadBks('${shopId}')" style="width:auto">
          <option value="">Todos</option>
          <option value="PENDING">Pendentes</option>
          <option value="CONFIRMED">Confirmados</option>
          <option value="CANCELLED">Cancelados</option>
          <option value="COMPLETED">Concluídos</option>
        </select>
        <input type="date" class="form-input" id="bkDateFilter" onchange="reloadBks('${shopId}')" style="width:auto">
      </div>
    </div>
    <div id="bksWrap"><div class="spinner spinner-sm"></div></div>`;
  await reloadBks(shopId);
};

async function reloadBks(shopId) {
  const wrap   = document.getElementById('bksWrap');
  const status = document.getElementById('bkStatusFilter')?.value||'';
  const date   = document.getElementById('bkDateFilter')?.value||'';
  if (!wrap) return;
  wrap.innerHTML = '<div class="spinner spinner-sm"></div>';
  try {
    let url = `/api/admin/bookings.php?barbershopId=${shopId}`;
    if (status) url += `&status=${status}`;
    if (date)   url += `&date=${date}`;
    const bks = await api(url);
    if (!bks.length) { wrap.innerHTML='<p class="text-muted text-sm">Nenhum agendamento encontrado.</p>'; return; }
    wrap.innerHTML = `<div class="admin-table-wrap"><table class="admin-table">
      <thead><tr><th>Data/Hora</th><th>Cliente</th><th>Serviço</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody>${bks.map(b=>`<tr>
        <td style="white-space:nowrap">${fmtDate(b.date)}</td>
        <td>${escHtml(b.user?.name||b.userId||'-')}</td>
        <td>${escHtml(b.service?.name||'-')}</td>
        <td><span class="badge badge-${bkStatusCls(b.status)}">${b.status||'-'}</span></td>
        <td style="white-space:nowrap">
          ${b.status==='PENDING'?`<button class="btn btn-sm" style="background:var(--success);color:#fff;border:none" onclick="updateBkStatus('${b.id}','CONFIRMED','${shopId}')">Confirmar</button>`:'' }
          ${!['CANCELLED','COMPLETED'].includes(b.status)?`<button class="btn btn-danger btn-sm" onclick="updateBkStatus('${b.id}','CANCELLED','${shopId}')">Cancelar</button>`:''}
        </td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  } catch(e){ wrap.innerHTML=`<p class="text-danger text-sm">${escHtml(e.message)}</p>`; }
}

async function updateBkStatus(id, status, shopId) {
  try {
    await api('/api/admin/bookings.php',{method:'PUT',body:JSON.stringify({id,status})});
    toast('Status atualizado.','success');
    reloadBks(shopId);
  } catch(e){ toast(e.message,'error'); }
}

/* ── HOURS ────────────────────────────────────────────────────── */
PAGES.hours = async function(el) {
  const shopId = await getShopId();
  if (!shopId) { el.innerHTML='<div class="alert alert-warning">Conta não vinculada.</div>'; return; }
  el.innerHTML = `<h2 class="admin-title">Horários de Funcionamento</h2><div id="hoursWrap"><div class="spinner spinner-sm"></div></div>`;
  await loadHours(shopId);
};

const DAYS_LONG = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];

async function loadHours(shopId) {
  const wrap = document.getElementById('hoursWrap');
  try {
    const hours = await api(`/api/admin/hours.php?barbershopId=${shopId}`);
    // Build 7-day form
    const map = {};
    hours.forEach(h => { map[h.dayOfWeek] = h; });
    wrap.innerHTML = `
      <form onsubmit="saveHours(event,'${shopId}')">
        <div style="display:flex;flex-direction:column;gap:.75rem;max-width:560px">
          ${[0,1,2,3,4,5,6].map(d => {
            const h = map[d]||{dayOfWeek:d,openTime:'09:00',closeTime:'18:00',closed:false};
            return `<div style="display:flex;align-items:center;gap:1rem;padding:.75rem;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius)">
              <label style="width:140px;font-weight:600;font-size:.875rem">${DAYS_LONG[d]}</label>
              <label style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;cursor:pointer;white-space:nowrap">
                <input type="checkbox" name="closed_${d}" ${h.closed?'checked':''} style="accent-color:var(--primary)"> Fechado
              </label>
              <input type="time" name="open_${d}" value="${h.openTime||'09:00'}" class="form-input" style="width:110px">
              <span class="text-muted text-sm">até</span>

let _carousel = [];
function addCarouselImg() {
  const inp = document.getElementById('carouselInput');
  const url = inp.value.trim();
  if (!url) return;
  _carousel.push(url);
  document.getElementById('carouselList').innerHTML = renderCarouselList(_carousel);
  inp.value = '';
}
function removeCarouselImg(i) {
  _carousel.splice(i,1);
  document.getElementById('carouselList').innerHTML = renderCarouselList(_carousel);
}

const ALL_MODULES = ['hero','services','carousel','hours','location','whatsapp','instagram'];
const MODULE_NAMES = { hero:'🖼 Hero / Banner', services:'✂️ Serviços', carousel:'🖼 Carrossel de imagens', hours:'🕐 Horários', location:'📍 Localização', whatsapp:'💬 Botão WhatsApp', instagram:'📸 Botão Instagram' };
let _modules = [];

function renderModuleList(activeModules) {
  _modules = [...activeModules];
  // Show all modules, active first then inactive
  const all = [...new Set([...activeModules, ...ALL_MODULES])];
  return all.map(m=>`
    <div class="module-item" draggable="true" data-module="${m}">
      <span style="cursor:grab;color:var(--text-muted)">⠿</span>
      <input type="checkbox" ${activeModules.includes(m)?'checked':''} onchange="toggleModule('${m}',this.checked)">
      <span style="flex:1;font-size:.875rem">${MODULE_NAMES[m]||m}</span>
    </div>`).join('');
}

function toggleModule(mod, checked) {
  if (checked && !_modules.includes(mod)) _modules.push(mod);
  if (!checked) _modules = _modules.filter(m=>m!==mod);
}

function setupDrag() {
  const list = document.getElementById('moduleList');
  if (!list) return;
  let dragged = null;
  list.addEventListener('dragstart', e=>{ dragged=e.target.closest('.module-item'); e.dataTransfer.effectAllowed='move'; });
  list.addEventListener('dragover', e=>{ e.preventDefault(); const target=e.target.closest('.module-item'); if(target&&target!==dragged){list.insertBefore(dragged,target.nextSibling?.nextSibling||target.nextSibling);} });
  list.addEventListener('dragend', ()=>{
    _modules = [...list.querySelectorAll('.module-item')].filter(el=>el.querySelector('input').checked).map(el=>el.dataset.module);
  });
}

function updateStylePreview() {
  const prev = document.getElementById('stylePreview');
  if (!prev) return;
  const bg    = document.getElementById('pbBg')?.value||'#1a1a1a';
  const text  = document.getElementById('pbText')?.value||'#e4e4e7';
  const accent= document.getElementById('pbAccent')?.value||'#f59e0b';
  const card  = document.getElementById('pbCard')?.value||'#242424';
  prev.style.background = bg;
  prev.style.color = text;
  prev.innerHTML = `<div style="color:${accent};font-weight:700">Pré-visualização de cores</div><div style="background:${card};padding:.5rem;border-radius:.5rem;margin-top:.5rem;font-size:.85rem">Card de exemplo</div>`;
}

/* ── BARBERSHOPS (superadmin) ─────────────────────────────────── */
PAGES.barbershops = async function(el) {
  el.innerHTML=`<div class="flex justify-between items-center mb-4"><h2 class="admin-title" style="margin:0">Barbearias</h2><button class="btn btn-primary btn-sm" onclick="openShopDialog(null)">+ Nova barbearia</button></div><div id="shopsWrap"><div class="spinner spinner-sm"></div></div>${shopDialog()}`;
  await reloadShops();
};

async function reloadShops() {
  const wrap=document.getElementById('shopsWrap');
  try {
    const shops=await api('/api/admin/barbershops.php');
    if(!shops.length){wrap.innerHTML='<p class="text-muted text-sm">Nenhuma barbearia cadastrada.</p>';return;}
    wrap.innerHTML=`<div class="admin-table-wrap"><table class="admin-table">
      <thead><tr><th>Nome</th><th>Slug / Link amigável</th><th>Ativo</th><th>Ações</th></tr></thead>
      <tbody>${shops.map(s=>{
        const slugLink = s.slug
          ? `<a href="${ROOT}/b/${escHtml(s.slug)}.html" target="_blank" class="badge badge-primary" title="Link amigável">/${escHtml(s.slug)}</a>`
          : `<span class="text-muted text-xs">Não definido</span>`;
        return `<tr>
          <td>
            <a href="${ROOT}/pages/barbershop.html?id=${s.id}" target="_blank" style="color:var(--primary)">${escHtml(s.name)}</a>
            ${s.customDomain?`<br><span class="text-xs text-muted">🌐 ${escHtml(s.customDomain)}</span>`:''}
          </td>
          <td>${slugLink}</td>
          <td><span class="badge badge-${s.active?'success':'danger'}">${s.active?'Ativo':'Inativo'}</span></td>
          <td style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm" onclick="openShopDialog(${JSON.stringify(JSON.stringify(s))})">Editar</button>
            <button class="btn ${s.active?'btn-danger':'btn-outline'} btn-sm" onclick="toggleShop('${s.id}',${!s.active})">${s.active?'Desativar':'Ativar'}</button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  } catch(e){wrap.innerHTML=`<p class="text-danger text-sm">${escHtml(e.message)}</p>`;}
}

function shopDialog(){return`<div class="dialog-backdrop" id="shopDialog"><div class="dialog" style="max-width:580px">
  <h3 class="dialog-title" id="shopDlgTitle">Nova barbearia</h3>
  <input type="hidden" id="shopId">
  <div class="form-group"><label class="form-label">Nome *</label><input class="form-input" id="shopName" placeholder="Barbearia do João"></div>
  <div class="form-group"><label class="form-label">Endereço</label><input class="form-input" id="shopAddr" placeholder="Rua, número, bairro, cidade"></div>
  <div class="form-group"><label class="form-label">Telefones (separados por vírgula)</label><input class="form-input" id="shopPhone" placeholder="(11) 99999-9999, (11) 3333-4444"></div>
  <div class="form-group"><label class="form-label">Descrição</label><textarea class="form-input form-textarea" id="shopDesc"></textarea></div>
  <div class="form-group"><label class="form-label">URL da imagem</label><input class="form-input" id="shopImg" placeholder="https://…"></div>
  <div class="form-group">
    <label class="form-label">🔗 Slug (link amigável)</label>
    <input class="form-input" id="shopSlug" placeholder="luiz" pattern="[a-z0-9\-]+" title="Apenas letras minúsculas, números e hífens">
    <p class="text-xs text-muted mt-1" id="shopSlugPreview">Link: —</p>
  </div>
  <div class="form-group">
    <label class="form-label">🌐 Domínio/Subdomínio customizado (opcional)</label>
    <input class="form-input" id="shopDomain" placeholder="luiz.barberon.shop">
    <p class="text-xs text-muted mt-1">Configure o DNS apontando para o servidor antes de ativar.</p>
  </div>
  <div class="form-group"><label style="display:flex;align-items:center;gap:.5rem;cursor:pointer"><input type="checkbox" id="shopActive" checked style="accent-color:var(--primary)"> Ativo</label></div>
  <div id="shopErr" class="alert alert-danger hidden mb-3"></div>
  <div class="flex gap-3">
    <button class="btn btn-outline" onclick="closeDialog('shopDialog')">Cancelar</button>
    <button class="btn btn-primary" id="shopSaveBtn" onclick="saveShop()">Salvar</button>
  </div>
</div></div>`;}

function openShopDialog(jsonStr){
  const errEl=document.getElementById('shopErr');
  errEl.classList.add('hidden');
  const slugInput=document.getElementById('shopSlug');
  const slugPreview=document.getElementById('shopSlugPreview');
  // Live slug preview
  slugInput.oninput=()=>{
    const v=slugInput.value.trim();
    const base=(ROOT||'').replace(/\/$/,'');
    slugPreview.textContent=v ? `Link: ${base}/b/${v}.html` : 'Link: —';
  };
  if(jsonStr){
    const s=JSON.parse(jsonStr);
    document.getElementById('shopDlgTitle').textContent='Editar barbearia';
    document.getElementById('shopId').value   =s.id;
    document.getElementById('shopName').value =s.name;
    document.getElementById('shopAddr').value =s.address||'';
    let phones=s.phones;if(!Array.isArray(phones)){try{phones=JSON.parse(phones||'[]');}catch{phones=[];}}
    document.getElementById('shopPhone').value=(phones||[]).join(', ');
    document.getElementById('shopDesc').value =s.description||'';
    document.getElementById('shopImg').value  =s.imageUrl||'';
    document.getElementById('shopSlug').value =s.slug||'';
    document.getElementById('shopDomain').value=s.customDomain||'';
    document.getElementById('shopActive').checked=!!s.active;
    const base=(ROOT||'').replace(/\/$/,'');
    slugPreview.textContent=s.slug ? `Link: ${base}/b/${s.slug}.html` : 'Link: —';
  }else{
    document.getElementById('shopDlgTitle').textContent='Nova barbearia';
    ['shopId','shopName','shopAddr','shopPhone','shopDesc','shopImg','shopSlug','shopDomain'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('shopActive').checked=true;
    slugPreview.textContent='Link: —';
  }
  document.getElementById('shopDialog').classList.add('open');
}

async function saveShop(){
  const id=document.getElementById('shopId').value;
  const errEl=document.getElementById('shopErr');
  const btn=document.getElementById('shopSaveBtn');
  const name=document.getElementById('shopName').value.trim();
  if(!name){errEl.textContent='Nome é obrigatório.';errEl.classList.remove('hidden');return;}
  btn.disabled=true;btn.textContent='Salvando…';
  const phones=document.getElementById('shopPhone').value.split(',').map(p=>p.trim()).filter(Boolean);
  const slug=document.getElementById('shopSlug').value.trim().toLowerCase().replace(/[^a-z0-9\-]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
  const body={name,address:document.getElementById('shopAddr').value,phones,description:document.getElementById('shopDesc').value,imageUrl:document.getElementById('shopImg').value,active:document.getElementById('shopActive').checked,slug:slug||null,customDomain:document.getElementById('shopDomain').value.trim()||null};
  try{
    if(id){body.id=id;await api('/api/admin/barbershops.php',{method:'PUT',body:JSON.stringify(body)});}
    else await api('/api/admin/barbershops.php',{method:'POST',body:JSON.stringify(body)});
    closeDialog('shopDialog');
    toast('Barbearia salva!','success');
    reloadShops();
  }catch(e){errEl.textContent=e.message;errEl.classList.remove('hidden');}
  finally{btn.disabled=false;btn.textContent='Salvar';}
}

async function toggleShop(id,active){
  try{await api('/api/admin/barbershops.php',{method:'PUT',body:JSON.stringify({id,active})});toast(active?'Barbearia ativada.':'Barbearia desativada.','info');reloadShops();}
  catch(e){toast(e.message,'error');}
}

/* ── USERS (superadmin) ─────────────────────────────────────────── */
PAGES.users = async function(el) {
  el.innerHTML=`<h2 class="admin-title">Usuários</h2><div id="usersWrap"><div class="spinner spinner-sm"></div></div>`;
  try{
    const users=await api('/api/admin/users.php');
    if(!users.length){document.getElementById('usersWrap').innerHTML='<p class="text-muted text-sm">Nenhum usuário.</p>';return;}
    document.getElementById('usersWrap').innerHTML=`<div class="admin-table-wrap"><table class="admin-table">
      <thead><tr><th>Nome</th><th>E-mail</th><th>Função</th><th>Cadastro</th></tr></thead>
      <tbody>${users.map(u=>`<tr>
        <td>${escHtml(u.name||'-')}</td>
        <td class="text-muted text-sm">${escHtml(u.email)}</td>
        <td><span class="badge badge-${u.role==='SUPERADMIN'?'primary':u.role==='ADMIN'?'warning':'muted'}">${u.role}</span></td>
        <td class="text-muted text-sm">${fmtDateShort(u.createdAt)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }catch(e){document.getElementById('usersWrap').innerHTML=`<p class="text-danger text-sm">${escHtml(e.message)}</p>`;}
};

/* ── SETTINGS (superadmin) ──────────────────────────────────────── */
PAGES.settings = async function(el) {
  el.innerHTML=`<h2 class="admin-title">Configurações do App</h2><div id="settWrap"><div class="spinner spinner-sm"></div></div>`;
  let cfg={appName:'Barberon',logoUrl:'',banners:[]};
  try{const s=await api('/api/admin/settings.php');Object.assign(cfg,s);cfg.banners=s.banners||[];}catch{}
  const banners=Array.isArray(cfg.banners)?cfg.banners:[];
  document.getElementById('settWrap').innerHTML=`
    <form onsubmit="saveSettings(event)" style="max-width:560px">
      <div class="form-group"><label class="form-label">Nome do App</label><input class="form-input" id="stName" value="${escHtml(cfg.appName||'Barberon')}" placeholder="Barberon"></div>
      <div class="form-group"><label class="form-label">URL do Logo</label><input class="form-input" id="stLogo" value="${escHtml(cfg.logoUrl||'')}" placeholder="https://…"></div>
      <div class="form-group"><label class="form-label">Banners da Home (uma URL por linha)</label><textarea class="form-input form-textarea" id="stBanners" style="min-height:100px" placeholder="https://imagem1.jpg&#10;https://imagem2.jpg">${banners.join('\n')}</textarea></div>
      <div id="settErr" class="alert alert-danger hidden mb-3"></div>
      <div id="settOk"  class="alert alert-success hidden mb-3">✅ Configurações salvas!</div>
      <button class="btn btn-primary" type="submit">Salvar configurações</button>
    </form>`;
};

async function saveSettings(e){
  e.preventDefault();
  const errEl=document.getElementById('settErr'),okEl=document.getElementById('settOk');
  const btn=e.target.querySelector('button[type=submit]');
  btn.disabled=true;btn.textContent='Salvando…';
  errEl.classList.add('hidden');okEl.classList.add('hidden');
  const banners=document.getElementById('stBanners').value.split('\n').map(s=>s.trim()).filter(Boolean);
  try{
    await api('/api/admin/settings.php',{method:'PUT',body:JSON.stringify({appName:document.getElementById('stName').value,logoUrl:document.getElementById('stLogo').value,banners})});
    okEl.classList.remove('hidden');setTimeout(()=>okEl.classList.add('hidden'),3000);
  }catch(err){errEl.textContent=err.message;errEl.classList.remove('hidden');}
  finally{btn.disabled=false;btn.textContent='Salvar configurações';}
}

/* ── HELPER: get barbershopId ─────────────────────────────────── */
async function getShopId() {
  if (_user.barbershopId) return _user.barbershopId;
  if (_user.role==='SUPERADMIN') return null;
  try{ const me=await api('/api/admin/me.php'); _user.barbershopId=me.barbershopId; return me.barbershopId; }catch{ return null; }
}
