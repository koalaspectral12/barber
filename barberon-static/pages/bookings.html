<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Agendamentos — Barberon</title>
  <link rel="icon" href="../img/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="../index.html" class="brand">
      <img src="../img/logo.svg" alt="Barberon" width="28" height="28"><span>Barberon</span>
    </a>
    <nav class="header-nav" id="headerNav"></nav>
    <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
  <div class="mobile-menu" id="mobileMenu"></div>
</header>

<main class="main-content">
  <div class="container" style="padding-top:1.5rem;padding-bottom:3rem;max-width:680px">

    <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:1.5rem">📅 Meus Agendamentos</h1>

    <!-- Tabs -->
    <div class="auth-tabs mb-4">
      <button class="auth-tab active" onclick="switchTab('upcoming',this)">Próximos</button>
      <button class="auth-tab" onclick="switchTab('past',this)">Histórico</button>
    </div>

    <div id="loadingState" style="text-align:center;padding:3rem 0"><div class="spinner"></div></div>
    <div id="errorState" class="alert alert-danger hidden"></div>

    <!-- Upcoming -->
    <div id="upcomingPanel">
      <div id="upcomingList"></div>
      <div id="upcomingEmpty" class="hidden" style="text-align:center;padding:3rem 1rem;border:1px dashed var(--border);border-radius:var(--radius)">
        <p style="font-size:2rem">📅</p>
        <p class="font-semibold mt-2">Nenhum agendamento próximo</p>
        <p class="text-muted text-sm mt-1">Que tal agendar agora?</p>
        <a href="barbershops.html" class="btn btn-primary mt-4">Ver barbearias</a>
      </div>
    </div>

    <!-- Past -->
    <div id="pastPanel" class="hidden">
      <div id="pastList"></div>
      <div id="pastEmpty" class="hidden" style="text-align:center;padding:3rem 1rem;border:1px dashed var(--border);border-radius:var(--radius)">
        <p style="font-size:2rem">📋</p>
        <p class="font-semibold mt-2">Nenhum histórico</p>
        <p class="text-muted text-sm mt-1">Seus agendamentos anteriores aparecerão aqui.</p>
      </div>
    </div>

  </div>
</main>

<!-- Cancel confirm dialog -->
<div class="dialog-backdrop" id="cancelDialog">
  <div class="dialog">
    <div class="dialog-title">Cancelar agendamento?</div>
    <p class="text-muted text-sm mb-4">Esta ação não pode ser desfeita.</p>
    <div id="cancelError" class="alert alert-danger hidden mb-3"></div>
    <div class="flex gap-3">
      <button class="btn btn-outline" onclick="closeCancelDialog()">Voltar</button>
      <button class="btn btn-danger" id="cancelConfirmBtn" onclick="doCancel()">Cancelar agendamento</button>
    </div>
  </div>
</div>

<footer class="site-footer">
  <p>© <span id="yr"></span> Barberon · Todos os direitos reservados.</p>
  <p><a href="about.html">Sobre nós</a> · <a href="pricing.html">Planos</a></p>
</footer>

<div id="toastContainer"></div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// Redirect if not logged in
if (!Auth.isLoggedIn()) {
  window.location.href = `login.html?cb=${encodeURIComponent(window.location.href)}`;
}

let _allBookings = [];
let _cancelId    = null;
let _activeTab   = 'upcoming';

const STATUS_LABEL = {
  PENDING:   { text:'Pendente',   cls:'badge-warning' },
  CONFIRMED: { text:'Confirmado', cls:'badge-success' },
  CANCELLED: { text:'Cancelado',  cls:'badge-danger'  },
  COMPLETED: { text:'Concluído',  cls:'badge-muted'   },
};

function switchTab(tab, btn) {
  _activeTab = tab;
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('upcomingPanel').classList.toggle('hidden', tab !== 'upcoming');
  document.getElementById('pastPanel').classList.toggle('hidden', tab !== 'past');
}

async function loadBookings() {
  const loadEl = document.getElementById('loadingState');
  const errEl  = document.getElementById('errorState');
  try {
    _allBookings = await api('/api/bookings/index.php');
    loadEl.classList.add('hidden');
    renderAll();
  } catch(e) {
    loadEl.classList.add('hidden');
    if (e.message.includes('401') || e.message.includes('Unauthorized')) {
      Auth.clear();
      window.location.href = `login.html?cb=${encodeURIComponent(window.location.href)}`;
    } else {
      errEl.textContent = e.message;
      errEl.classList.remove('hidden');
    }
  }
}

function renderAll() {
  const now = new Date();
  const upcoming = _allBookings.filter(b => new Date(b.date) >= now && b.status !== 'CANCELLED');
  const past     = _allBookings.filter(b => new Date(b.date) <  now || b.status === 'CANCELLED');

  renderList(upcoming, 'upcomingList', 'upcomingEmpty', true);
  renderList(past,     'pastList',     'pastEmpty',     false);
}

function renderList(items, listId, emptyId, showCancel) {
  const listEl  = document.getElementById(listId);
  const emptyEl = document.getElementById(emptyId);
  if (!items.length) {
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');
  listEl.innerHTML = items.map(b => {
    const st = STATUS_LABEL[b.status] || { text: b.status, cls:'badge-muted' };
    const canCancel = showCancel && !['CANCELLED','COMPLETED'].includes(b.status);
    return `
    <div class="booking-item" id="bk-${b.id}">
      <img src="${b.service?.imageUrl||'../img/logo.svg'}" alt="" loading="lazy" onerror="this.src='../img/logo.svg'">
      <div class="bk-info">
        <div class="bk-shop">${escHtml(b.barbershop?.name||'Barbearia')}</div>
        <div class="bk-svc">${escHtml(b.service?.name||'Serviço')}</div>
        <div class="bk-date">📅 ${fmtDate(b.date)}</div>
        <div class="mt-2"><span class="badge ${st.cls}">${st.text}</span></div>
      </div>
      <div class="bk-actions">
        ${canCancel ? `<button class="btn btn-sm btn-danger" onclick="openCancelDialog('${b.id}')">Cancelar</button>` : ''}
        <a href="barbershop.html?id=${b.barbershopId}" class="btn btn-sm btn-ghost mt-1" style="display:block">Ver</a>
      </div>
    </div>`;
  }).join('');
}

// ── Cancel dialog ─────────────────────────────────────────────
function openCancelDialog(id) {
  _cancelId = id;
  document.getElementById('cancelError').classList.add('hidden');
  document.getElementById('cancelConfirmBtn').disabled = false;
  document.getElementById('cancelConfirmBtn').textContent = 'Cancelar agendamento';
  document.getElementById('cancelDialog').classList.add('open');
}
function closeCancelDialog() {
  document.getElementById('cancelDialog').classList.remove('open');
  _cancelId = null;
}

async function doCancel() {
  if (!_cancelId) return;
  const btn   = document.getElementById('cancelConfirmBtn');
  const errEl = document.getElementById('cancelError');
  btn.disabled = true; btn.textContent = 'Cancelando…';
  errEl.classList.add('hidden');
  try {
    await api('/api/bookings/index.php?id=' + encodeURIComponent(_cancelId), {
      method: 'DELETE',
    });
    // Update local state
    _allBookings = _allBookings.map(b => b.id === _cancelId ? { ...b, status: 'CANCELLED' } : b);
    closeCancelDialog();
    renderAll();
    toast('Agendamento cancelado.', 'info');
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Cancelar agendamento';
  }
}

loadBookings();
</script>
</body>
</html>
