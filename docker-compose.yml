version: "3"

services:
  mysql:
    image: mysql:8.0
    container_name: fsw-barber-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: fsw-barber
      MYSQL_USER: mysql
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - ./.mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  .mysql-data:
