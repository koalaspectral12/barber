<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Barberon</title>
  <link rel="icon" href="../img/logo.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="../index.html" class="brand">
      <img src="../img/logo.svg" alt="Barberon" width="28" height="28"><span>Barberon</span>
    </a>
    <nav class="header-nav" id="headerNav"></nav>
  </div>
</header>

<main class="main-content">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="../img/logo.svg" width="32" height="32" alt="Barberon">
        <span>Barberon</span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login',this)">Entrar</button>
        <button class="auth-tab" onclick="switchTab('register',this)">Criar conta</button>
      </div>

      <!-- Login -->
      <div class="tab-panel active" id="loginPanel">
        <div id="loginError" class="alert alert-danger hidden"></div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input class="form-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-block" id="loginBtn" onclick="doLogin()">Entrar</button>
      </div>

      <!-- Register -->
      <div class="tab-panel" id="registerPanel">
        <div id="regError"   class="alert alert-danger  hidden"></div>
        <div id="regSuccess" class="alert alert-success hidden"></div>
        <div class="form-group">
          <label class="form-label">Nome completo</label>
          <input class="form-input" type="text" id="regName" placeholder="Seu nome" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input class="form-input" type="email" id="regEmail" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input class="form-input" type="password" id="regPass" placeholder="mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <button class="btn btn-primary btn-block" id="regBtn" onclick="doRegister()">Criar conta</button>
      </div>
    </div>
  </div>
</main>

<div id="toastContainer"></div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/app.js"></script>
<script>
// Redirect if already logged in
if (Auth.isLoggedIn()) window.location.href = ROOT + '/index.html';

const cb = getParam('cb') || (ROOT + '/index.html');

function switchTab(tab, btn) {
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tab + 'Panel').classList.add('active');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');
  errEl.classList.add('hidden');
  if (!email || !pass) { errEl.textContent = 'Preencha e-mail e senha.'; errEl.classList.remove('hidden'); return; }
  btn.disabled = true; btn.textContent = 'Entrando…';
  try {
    await apiLogin(email, pass);
    window.location.href = cb;
  } catch(e) {
    errEl.textContent = e.message || 'Credenciais inválidas.';
    errEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Entrar';
  }
}

async function doRegister() {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const errEl = document.getElementById('regError');
  const sucEl = document.getElementById('regSuccess');
  const btn   = document.getElementById('regBtn');
  errEl.classList.add('hidden'); sucEl.classList.add('hidden');
  if (!name || !email || !pass) { errEl.textContent = 'Preencha todos os campos.'; errEl.classList.remove('hidden'); return; }
  if (pass.length < 6) { errEl.textContent = 'Senha deve ter no mínimo 6 caracteres.'; errEl.classList.remove('hidden'); return; }
  btn.disabled = true; btn.textContent = 'Criando…';
  try {
    await apiRegister(name, email, pass);
    window.location.href = cb;
  } catch(e) {
    errEl.textContent = e.message || 'Erro ao criar conta.';
    errEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Criar conta';
  }
}

// Enter key shortcuts
['loginEmail','loginPass'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
});
['regName','regEmail','regPass'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
});
</script>
</body>
</html>
